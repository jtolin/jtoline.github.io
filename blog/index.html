<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/jtoline.github.io/assets/css/style.scss">
</head>
<style>
    .center-text {
        text-align: center;
    }
    .footer {
        text-align: center;
        bottom: 0;
        width: 80%;
        margin: 0 auto;
    }
    .center-img {
        display: block;
        margin: 0 auto;
        max-width: 100%;
        height: auto;
    }
</style>
<body>
    <h1 class="center-text">Blog</h1>
    <p class="center-text">Welcome to my goat-based blog! Here are some of my goat posts for you to enjoy:</p>
    <ul>
    {% for post in site.posts %}
        <li>
        <a href="{{ post.url | prepend: site.baseurl | prepend: site.url }}">{{ post.title }}</a>
        <span>{{ post.date | date: "%B %d, %Y" }}</span>
        </li>
    {% endfor %}
    </ul>
    <br><br>
    <div class="center-text">
        <img src="/jtoline.github.io/assets/images/test_goat_3.jpg" alt="Test Goat Please Ignore" class="center-img">
    </div>
    <div class="footer">
        <p>Copyright 2026 &#128016; All Rights Reserved.</p>
    </div>
</body>
